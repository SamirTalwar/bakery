working-directory: .

command:
  - cargo
  - run
  - --quiet

tests:
  - name: stdin-to-stdout
    args:
      - stdin-to-stdout.bake
    stdin: |
      Hello, world!
    stdout: |
      Hello, world!

  - name: stdin-to-file
    args:
      - stdin-to-file.bake
    stdin: |
      What's up, planet?
    files:
      - path: output/file.out
        contents: |
          What's up, planet?
    revert:
      - output

  - name: file-to-stdout
    args:
      - file-to-stdout.bake
    stdout:
      file: fixtures/file.in

  - name: run-simple-program
    args:
      - run-simple-program.bake
    stdout: |
      Hello, world!

  - name: write-static-text-to-stdout
    args:
      - write-static-text-to-stdout.bake
    stdout: |
      This is some static text.
