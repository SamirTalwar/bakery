working-directory: .

command:
  - cargo
  - run
  - --quiet

tests:
  - name: stdin-to-stdout
    args:
      - stdin-to-stdout.bake
    stdin: |
      Hello, world!
    stdout: |
      Hello, world!

  - name: stdin-to-file
    args:
      - stdin-to-file.bake
    stdin: |
      What's up, planet?
    files:
      - path: file.out
        contents: |
          What's up, planet?
    revert:
      - .
