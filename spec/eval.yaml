working-directory: .

command:
  - cargo
  - run
  - --quiet
  - --
  - eval

tests:
  - name: stdin-to-stdout
    args:
      - |
        stdin |> stdout
    stdin: |
      Hello, world!
    stdout: |
      Hello, world!

  - name: stdin-to-file
    args:
      - |
        stdin |> file:output/file.out
    stdin: |
      What's up, planet?
    files:
      - path: output/file.out
        contents: |
          What's up, planet?
    revert:
      - output

  - name: file-to-stdout
    args:
      - |
        file:fixtures/file.in |> stdout
    stdout:
      file: fixtures/file.in

  - name: write-static-text-to-stdout
    args:
      - |
        "This is some static text." |> stdout
    stdout: |
      This is some static text.

  - name: run-simple-program
    args:
      - |
        hello
    stdout: |
      Hello, world!

  - name: run-program-with-one-argument
    args:
      - |
        echo "This is an argument."
    stdout: |
      This is an argument.

  - name: run-program-with-multiple-arguments
    args:
      - |
        echo "This is an argument." "This is another argument."
    stdout: |
      This is an argument. This is another argument.

  - name: pipe-to-programs
    args:
      - |
        echo "This text is mostly lowercase." |> tr "[:lower:]" "[:upper:]"
    stdout: |
      THIS TEXT IS MOSTLY LOWERCASE.

  - name: run-programs-with-raw-string-arguments
    args:
      - |
        echo hello world
    stdout: |
      hello world

  - name: run-programs-with-file-arguments
    args:
      - |
        cat file:./fixtures/one.in file:./fixtures/two.in
    stdout: |
      one
      two
      2

  - name: multiple-pipes
    args:
      - |
        cat file:./fixtures/file.in |> tr "aeiouAEIOU" "AEIOUaeiou" |> file:./output/pipes.out
    files:
      - path: output/pipes.out
        contents: |
          oh, hEAvEns!
    revert:
      - output
