working-directory: .

command:
  - cargo
  - run
  - --quiet
  - --
  - eval

tests:
  - name: stdin-to-stdout
    args:
      - |
        stdin |> stdout
    stdin: |
      Hello, world!
    stdout: |
      Hello, world!

  - name: stdin-to-file
    args:
      - |
        stdin |> file:output/file.out
    stdin: |
      What's up, planet?
    files:
      - path: output/file.out
        contents: |
          What's up, planet?
    revert:
      - output

  - name: file-to-stdout
    args:
      - |
        file:fixtures/file.in |> stdout
    stdout:
      file: fixtures/file.in

  - name: write-static-text-to-stdout
    args:
      - |
        "This is some static text." |> stdout
    stdout: |
      This is some static text.

  - name: run-simple-program
    args:
      - |
        hello
    stdout: |
      Hello, world!

  - name: run-program-with-one-argument
    args:
      - |
        echo "This is an argument."
    stdout: |
      This is an argument.
