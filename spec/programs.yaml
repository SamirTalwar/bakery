working-directory: .

command:
  - cargo
  - run
  - --quiet
  - --
  - eval

tests:
  - name: run-simple-program
    args:
      - |
        hello
    stdout: |
      Hello, world!

  - name: run-program-with-one-argument
    args:
      - |
        echo "This is an argument."
    stdout: |
      This is an argument.

  - name: run-program-that-reads-stdin
    args:
      - |
        cat |> file:output/file.out
    stdin: |
      INCOMING!
    files:
      - path: output/file.out
        contents: |
          INCOMING!
    revert:
      - output

  - name: pipe-to-programs
    args:
      - |
        echo "This text is mostly lowercase." |> tr "[:lower:]" "[:upper:]"
    stdout: |
      THIS TEXT IS MOSTLY LOWERCASE.

  - name: run-programs-with-raw-string-arguments
    args:
      - |
        echo hello world
    stdout: |
      hello world

  - name: run-programs-with-file-arguments
    args:
      - |
        cat file:./fixtures/one.in file:./fixtures/two.in
    stdout: |
      one
      two
      2
